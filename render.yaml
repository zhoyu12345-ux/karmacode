services:
  - type: web
    name: karmacode-api
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MOCK_CLAUDE
        value: "true"
      - key: FRONTEND_URL
        value: https://karmacode-r.netlify.app
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
    autoDeploy: true
